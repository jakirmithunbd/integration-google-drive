name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify plugin version matches tag
        run: |
          PLUGIN_VERSION=$(grep -m1 "^\s*\* Version:" integration-google-drive.php | awk '{print $NF}')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Plugin version : $PLUGIN_VERSION"
          echo "Tag version    : $TAG_VERSION"
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Plugin header version ($PLUGIN_VERSION) does not match tag ($TAG_VERSION)."
            echo "   Update the 'Version:' line in integration-google-drive.php before tagging."
            exit 1
          fi
          echo "✅ Versions match."

      - name: Create plugin ZIP
        run: |
          mkdir -p build/integration-google-drive
          rsync -r \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            --exclude='build' \
            --exclude='tests' \
            --exclude='run-tests.sh' \
            --exclude='debug.log' \
            --exclude='.DS_Store' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='webpack.prod.config.js' \
            --exclude='webpack.dev.config.js' \
            --exclude='postcss.config.js' \
            . build/integration-google-drive/
          cd build
          zip -r ../integration-google-drive.zip integration-google-drive/
          echo "ZIP size: $(du -sh ../integration-google-drive.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: integration-google-drive.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
